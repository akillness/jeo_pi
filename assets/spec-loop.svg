<svg width="1100" height="380" viewBox="0 0 1100 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">jeo_pi spec loop</title>
  <desc id="d">The Ouroboros spec-first loop: Interview, Seed, Execute, Evaluate, Evolve, with verifier-gated goal continuation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1100" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B0A10"/><stop offset="1" stop-color="#16131C"/>
    </linearGradient>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#A78BFA"/>
    </marker>
  </defs>
  <rect width="1100" height="380" rx="18" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1099" height="379" rx="18" fill="none" stroke="#2A2A35"/>
  <text x="60" y="58" font-family="ui-monospace,Menlo,monospace" font-size="22" font-weight="700" fill="#E7E7EC">spec-first loop</text>
  <text x="60" y="84" font-family="ui-sans-serif,system-ui,sans-serif" font-size="15" fill="#8B8B96">immutable Ouroboros seed · verifier-gated completion · measurable drift</text>

  <g font-family="ui-monospace,Menlo,monospace" font-size="19" fill="#0B0A10" text-anchor="middle">
    <g transform="translate(60,150)"><rect width="160" height="56" rx="12" fill="#22D3EE"/><text x="80" y="34">Interview</text></g>
    <g transform="translate(265,150)"><rect width="120" height="56" rx="12" fill="#7DD3FC"/><text x="60" y="34">Seed</text></g>
    <g transform="translate(430,150)"><rect width="140" height="56" rx="12" fill="#A78BFA"/><text x="70" y="34">Execute</text></g>
    <g transform="translate(615,150)"><rect width="150" height="56" rx="12" fill="#C084FC"/><text x="75" y="34">Evaluate</text></g>
    <g transform="translate(810,150)"><rect width="130" height="56" rx="12" fill="#F97316"/><text x="65" y="34">Evolve</text></g>
  </g>
  <g stroke="#A78BFA" stroke-width="2" fill="none" marker-end="url(#ar)">
    <line x1="222" y1="178" x2="263" y2="178"/>
    <line x1="387" y1="178" x2="428" y2="178"/>
    <line x1="572" y1="178" x2="613" y2="178"/>
    <line x1="767" y1="178" x2="808" y2="178"/>
  </g>
  <!-- evolve feeds back to interview -->
  <path d="M875 206 C 875 300, 140 300, 140 208" stroke="#F97316" stroke-width="2" fill="none" stroke-dasharray="5 5" marker-end="url(#ar)"/>
  <text x="507" y="290" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" fill="#9aa">record drift → re-seed</text>

  <!-- goal continuation note -->
  <path d="M500 206 C 500 250, 690 250, 690 208" stroke="#56C5E8" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>
  <text x="595" y="248" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#56C5E8">FAIL → continue until PASS</text>
</svg>
